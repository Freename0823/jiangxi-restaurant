<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>核销 · 江西饭店 店员専用</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css">
<style>
:root{--paper:#f3e8d6;--ink:#2a211a;--ink-soft:#5b4b3a;--clay:#b04127;--clay-deep:#7e2c19;--bamboo:#5d6b35;--ochre:#c98a2b;--line:rgba(42,33,26,.18)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"LXGW WenKai",serif;background:var(--ink);color:var(--paper);min-height:100vh;padding:24px 18px;line-height:1.7}
.wrap{max-width:460px;margin:0 auto}
.head{text-align:center;margin-bottom:24px}
.seal{width:54px;height:54px;margin:0 auto 10px;background:var(--clay);color:var(--paper);display:grid;place-items:center;border-radius:8px;font-size:28px;font-weight:900;transform:rotate(-3deg);box-shadow:3px 3px 0 var(--clay-deep)}
.head h1{font-size:22px;letter-spacing:.06em}
.head p{font-size:13px;color:rgba(243,232,214,.55);letter-spacing:.2em}
.card{background:rgba(243,232,214,.06);border:1px solid rgba(243,232,214,.16);border-radius:14px;padding:22px;margin-bottom:18px}
label{display:block;font-size:12px;letter-spacing:.2em;color:var(--ochre);margin-bottom:8px}
input{width:100%;padding:14px 16px;border-radius:10px;border:1.5px solid rgba(243,232,214,.25);background:rgba(0,0,0,.2);color:var(--paper);font:inherit;font-size:18px;letter-spacing:.05em}
input:focus{outline:none;border-color:var(--ochre)}
input::placeholder{color:rgba(243,232,214,.35)}
.codein{text-transform:uppercase;text-align:center;font-size:24px;letter-spacing:.15em}
button{width:100%;margin-top:16px;padding:16px;border:0;border-radius:10px;font:inherit;font-size:18px;letter-spacing:.08em;cursor:pointer;background:var(--clay);color:var(--paper);box-shadow:0 4px 0 var(--clay-deep);transition:transform .15s,box-shadow .15s}
button:active{transform:translateY(3px);box-shadow:0 1px 0 var(--clay-deep)}
button.ghost{background:transparent;border:1.5px solid rgba(243,232,214,.3);box-shadow:none;font-size:15px}
.result{margin-top:18px;border-radius:12px;padding:20px;text-align:center;font-size:20px;display:none}
.result.show{display:block;animation:pop .3s ease}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.result.ok{background:rgba(93,107,53,.25);border:1.5px solid var(--bamboo)}
.result.warn{background:rgba(201,138,43,.2);border:1.5px solid var(--ochre)}
.result.err{background:rgba(176,65,39,.2);border:1.5px solid var(--clay)}
.result .icon{font-size:46px;display:block;margin-bottom:6px}
.result .small{font-size:13px;color:rgba(243,232,214,.6);margin-top:8px;letter-spacing:.05em}
.stats{display:flex;gap:12px;text-align:center}
.stats>div{flex:1;background:rgba(0,0,0,.2);border-radius:10px;padding:14px 6px}
.stats .num{font-size:30px;font-weight:900;color:var(--ochre);line-height:1}
.stats .lbl{font-size:12px;color:rgba(243,232,214,.55);margin-top:6px;letter-spacing:.1em}
.muted{font-size:12px;color:rgba(243,232,214,.4);text-align:center;margin-top:20px;letter-spacing:.05em}
.toggle{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:10px;font-size:13px;color:rgba(243,232,214,.6)}
.scanwrap{margin-top:14px;border-radius:12px;overflow:hidden;display:none}
#reader{width:100%}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="seal">赣</div>
    <h1>优惠券核销</h1>
    <p>STAFF ONLY · 店員専用</p>
  </div>

  <div class="card">
    <label>店员 PIN · 暗証番号</label>
    <input id="pin" type="password" inputmode="numeric" placeholder="输入核销密码" autocomplete="off">
    <div class="toggle"><input type="checkbox" id="remember" checked style="width:auto"> <span>记住本机 PIN</span></div>
  </div>

  <div class="card">
    <label>优惠券码 · クーポンコード</label>
    <input id="code" class="codein" placeholder="JX-XXXXXX" autocomplete="off">
    <button id="scanBtn" class="ghost" type="button">📷 扫一扫顾客二维码</button>
    <div class="scanwrap" id="scanwrap"><div id="reader"></div></div>
    <button id="redeemBtn" type="button">核 销</button>
    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <label>今日 / 累计 数据</label>
    <div class="stats">
      <div><div class="num" id="stTodayR">–</div><div class="lbl">今日核销</div></div>
      <div><div class="num" id="stTodayC">–</div><div class="lbl">今日领取</div></div>
      <div><div class="num" id="stAllR">–</div><div class="lbl">累计核销</div></div>
    </div>
    <button id="statBtn" class="ghost" type="button" style="margin-top:14px">刷新数据</button>
  </div>

  <div class="muted">本页仅店员使用，请勿外传链接。</div>
</div>

<script src="supabase-config.js"></script>
<script>
const $ = id => document.getElementById(id);
const rpc = async (fn, body) => {
  const r = await fetch(`${window.SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method:'POST',
    headers:{'apikey':window.SUPABASE_ANON_KEY,'Authorization':'Bearer '+window.SUPABASE_ANON_KEY,'Content-Type':'application/json'},
    body: JSON.stringify(body||{})
  });
  if(!r.ok) throw new Error('网络错误 '+r.status);
  return r.json();
};

// 记住 PIN + 从二维码 URL 自动填码
(function init(){
  try{ const p=localStorage.getItem('jx-pin'); if(p) $('pin').value=p; }catch(e){}
  const c=new URLSearchParams(location.search).get('code');
  if(c) $('code').value=c.toUpperCase();
})();

function showResult(cls, icon, msg, small){
  const el=$('result');
  el.className='result show '+cls;
  el.innerHTML=`<span class="icon">${icon}</span>${msg}`+(small?`<div class="small">${small}</div>`:'');
}

$('redeemBtn').onclick = async () => {
  const pin=$('pin').value.trim(), code=$('code').value.trim();
  if(!pin) return showResult('err','🔒','请先输入店员 PIN');
  if(!code) return showResult('err','⚠️','请输入或扫描优惠券码');
  if($('remember').checked){ try{localStorage.setItem('jx-pin',pin);}catch(e){} } else { try{localStorage.removeItem('jx-pin');}catch(e){} }
  showResult('warn','⏳','核销中…');
  try{
    const res = await rpc('redeem_coupon', {p_code:code, p_pin:pin});
    if(res.ok){
      showResult('ok','✅','核销成功！', (res.offer||'')+'　'+res.code);
      $('code').value=''; loadStats();
    } else if(res.status==='already'){
      showResult('warn','🚫','这张券已经用过了', '核销时间：'+new Date(res.redeemed_at).toLocaleString('ja-JP'));
    } else if(res.status==='not_found'){
      showResult('err','❓','查无此券，请核对券码');
    } else if(res.status==='bad_pin'){
      showResult('err','🔒','店员 PIN 不正确');
    } else { showResult('err','⚠️','无法核销'); }
  }catch(e){ showResult('err','📵', e.message||'连接失败'); }
};

async function loadStats(){
  const pin=$('pin').value.trim(); if(!pin) return;
  try{
    const s=await rpc('coupon_stats',{p_pin:pin});
    if(s.ok){ $('stTodayR').textContent=s.today_redeemed; $('stTodayC').textContent=s.today_claimed; $('stAllR').textContent=s.redeemed; }
  }catch(e){}
}
$('statBtn').onclick = loadStats;

// 扫码（按需加载 html5-qrcode）
let scanner=null;
$('scanBtn').onclick = async () => {
  const wrap=$('scanwrap');
  if(scanner){ try{await scanner.stop();}catch(e){} scanner=null; wrap.style.display='none'; $('scanBtn').textContent='📷 扫一扫顾客二维码'; return; }
  if(!window.Html5Qrcode){
    await new Promise((ok,no)=>{const s=document.createElement('script');s.src='https://unpkg.com/html5-qrcode';s.onload=ok;s.onerror=no;document.head.appendChild(s);});
  }
  wrap.style.display='block'; $('scanBtn').textContent='✕ 关闭扫码';
  scanner=new Html5Qrcode('reader');
  scanner.start({facingMode:'environment'},{fps:10,qrbox:220}, txt=>{
    // 二维码内容可能是完整 URL（含 ?code=）也可能是纯券码
    let code=txt.trim();
    const m=code.match(/[?&]code=([^&]+)/i); if(m) code=decodeURIComponent(m[1]);
    $('code').value=code.toUpperCase();
    scanner.stop().then(()=>{scanner=null;wrap.style.display='none';$('scanBtn').textContent='📷 扫一扫顾客二维码';});
    $('redeemBtn').click();
  }).catch(e=>{ wrap.style.display='none'; $('scanBtn').textContent='📷 扫一扫顾客二维码'; showResult('err','📷','无法打开相机，请手动输入券码'); });
};
</script>
</body>
</html>
